name: Final closure workspace

on:
  push:
    branches:
      - audit/iteration2-preflight-20260618

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/iteration2-preflight-20260618
          fetch-depth: 0
          persist-credentials: true
      - name: Export current product patch
        shell: bash
        run: |
          set -euo pipefail
          base=2eae7cf325c8ac25fe92c58494a003e4d8cf08f4
          head=3857b2adb0d5cb18b7d1260397c31fbd87259d36
          git fetch origin feat/multi-cve-contextual-analysis
          test "$(git rev-parse origin/feat/multi-cve-contextual-analysis)" = "$head"
          git diff --binary "$base" "$head" -- . ':(exclude)web/docs/screenshots/*' > /tmp/current-product.patch
          sha256sum /tmp/current-product.patch > /tmp/current-product.patch.sha256
          xz -9 -c /tmp/current-product.patch | base64 -w 0 > /tmp/current-product.patch.xz.b64
          rm -rf audit/final-closure-export
          mkdir -p audit/final-closure-export
          split -b 4000 -d -a 3 /tmp/current-product.patch.xz.b64 audit/final-closure-export/part-
          cp /tmp/current-product.patch.sha256 audit/final-closure-export/patch.sha256
          printf '%s\n' "$base" > audit/final-closure-export/base.txt
          printf '%s\n' "$head" > audit/final-closure-export/head.txt
          wc -c /tmp/current-product.patch /tmp/current-product.patch.xz.b64 > audit/final-closure-export/sizes.txt
          find audit/final-closure-export -maxdepth 1 -name 'part-*' -printf '%f\n' | sort > audit/final-closure-export/parts.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/final-closure-export
          git commit -m "chore(audit): export current product patch"
          git push origin HEAD:audit/iteration2-preflight-20260618
