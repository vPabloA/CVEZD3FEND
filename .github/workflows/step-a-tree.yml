name: Step A tree metadata

on:
  pull_request:
    branches:
      - feat/multi-cve-contextual-analysis

permissions:
  contents: read

jobs:
  tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Resolve audited trees
        run: |
          git fetch origin feat/multi-cve-contextual-analysis
          git rev-parse origin/feat/multi-cve-contextual-analysis > product-head.txt
          git rev-parse origin/feat/multi-cve-contextual-analysis^{tree} > product-tree.txt
          git rev-parse HEAD > audit-head.txt
          git rev-parse HEAD^{tree} > audit-tree.txt
      - name: Upload tree metadata
        uses: actions/upload-artifact@v4
        with:
          name: step-a-tree-metadata
          path: |
            product-head.txt
            product-tree.txt
            audit-head.txt
            audit-tree.txt
          if-no-files-found: error
          retention-days: 7
