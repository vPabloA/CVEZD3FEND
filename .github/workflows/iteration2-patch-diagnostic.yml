name: Iteration 2 patch diagnostic

on:
  pull_request:
    branches:
      - feat/multi-cve-contextual-analysis

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Report patch transport integrity
        shell: bash
        run: |
          branch=audit/iteration2-preflight-20260618
          git fetch origin "$branch"
          {
            for part in feature.00 feature.01 feature.02; do
              git show "origin/$branch:audit/iteration2/patches/$part" > "$part"
              sha256sum "$part"
              wc -c "$part"
            done
          } > patch-diagnostic.txt 2>&1
          cat patch-diagnostic.txt
      - uses: actions/upload-artifact@v4
        with:
          name: iteration2-patch-diagnostic
          path: patch-diagnostic.txt
          if-no-files-found: error
          retention-days: 7
