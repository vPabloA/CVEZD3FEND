name: Iteration 2 patch diagnostic

on:
  pull_request:
    branches:
      - feat/multi-cve-contextual-analysis

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/iteration2-preflight-20260618
          fetch-depth: 0
      - name: Report split transport integrity
        shell: bash
        run: |
          {
            sha256sum audit/iteration2/patches/feature.00.0
            sha256sum audit/iteration2/patches/feature.00.1
            sha256sum audit/iteration2/patches/feature.00.2
            sha256sum audit/iteration2/patches/feature.00.3
            wc -c audit/iteration2/patches/feature.00.0 audit/iteration2/patches/feature.00.1 audit/iteration2/patches/feature.00.2 audit/iteration2/patches/feature.00.3
            cat audit/iteration2/patches/feature.00.0 audit/iteration2/patches/feature.00.1 audit/iteration2/patches/feature.00.2 audit/iteration2/patches/feature.00.3 > assembled-feature.00
            sha256sum assembled-feature.00
            wc -c assembled-feature.00
          } > patch-diagnostic.txt 2>&1
          cat patch-diagnostic.txt
      - uses: actions/upload-artifact@v4
        with:
          name: iteration2-patch-diagnostic
          path: patch-diagnostic.txt
          if-no-files-found: error
          retention-days: 7
