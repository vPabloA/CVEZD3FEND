name: FastTrack tree metadata

on:
  pull_request:
    branches:
      - audit/fasttrack-baseline-base

permissions:
  contents: read

jobs:
  tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture pull-request head tree
        run: |
          mkdir -p tree-metadata
          git rev-parse "${{ github.event.pull_request.head.sha }}^{tree}" | tee tree-metadata/head-tree.txt
          printf '%s\n' "${{ github.event.pull_request.head.sha }}" | tee tree-metadata/head-commit.txt
      - uses: actions/upload-artifact@v4
        with:
          name: fasttrack-tree-metadata
          path: tree-metadata/
          retention-days: 1
