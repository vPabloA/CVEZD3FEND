name: Final full frontend regression report

on:
  pull_request:
    branches:
      - feat/multi-cve-contextual-analysis

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit harness
        uses: actions/checkout@v4
        with:
          ref: audit/iteration2-preflight-20260618
          fetch-depth: 0
      - name: Prepare correction
        shell: bash
        run: |
          set -euo pipefail
          cp -r audit/final-closure /tmp/final-closure
          git fetch origin feat/multi-cve-contextual-analysis
          git checkout -B correction 3857b2adb0d5cb18b7d1260397c31fbd87259d36
          python /tmp/final-closure/apply_all.py
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend
        working-directory: web
        run: npm ci
      - name: Export JSON suite report
        shell: bash
        working-directory: web
        run: |
          set +e
          npx vitest run --reporter=json --outputFile=/tmp/full-report.json
          cp /tmp/full-report.json ../full-report.json
          exit 0
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: final-full-frontend-report
          path: full-report.json
          if-no-files-found: error
          retention-days: 7
