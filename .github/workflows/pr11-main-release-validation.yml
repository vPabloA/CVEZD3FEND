name: PR11 main release validation

on:
  pull_request:
    branches:
      - audit/pr11-main-validation-base

permissions:
  contents: read

jobs:
  release-validation:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout merged release tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release topology
        shell: bash
        run: |
          set -euo pipefail
          product_head="$(git rev-parse HEAD^2^)"
          test "$product_head" = "661334a4e70d12c51ba627b35a795f39068ead0a"
          test -z "$(git status --short)"
          git rev-parse HEAD > pr11-main-validation-merge-head.txt
          git rev-parse HEAD^1 > pr11-main-validation-base-head.txt
          printf '%s\n' "$product_head" > pr11-main-validation-product-head.txt
          git diff --stat HEAD^1..."$product_head" > pr11-main-validation-diff-stat.txt
          git diff --name-only HEAD^1..."$product_head" > pr11-main-validation-files.txt

      - name: Restore generated bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/dist
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/knowledge-bundle.json > data/dist/knowledge-bundle.json
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/promoted-edges.json > data/dist/promoted-edges.json
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/quality-report.json > data/dist/quality-report.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,api]'

      - name: Compile Python
        shell: bash
        run: |
          set -o pipefail
          python3 -m compileall src tests 2>&1 | tee pr11-main-validation-compileall.txt

      - name: Run backend tests
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pr11-main-validation-pytest.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend
        working-directory: web
        run: npm ci

      - name: Run frontend lint
        shell: bash
        working-directory: web
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee ../pr11-main-validation-frontend-lint.txt

      - name: Run frontend tests
        shell: bash
        working-directory: web
        run: |
          set -o pipefail
          npm run test 2>&1 | tee ../pr11-main-validation-frontend-test.txt

      - name: Run frontend build
        shell: bash
        working-directory: web
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../pr11-main-validation-frontend-build.txt

      - name: Validate diff and frontend trust boundary
        shell: bash
        run: |
          set -euo pipefail
          product_head="$(git rev-parse HEAD^2^)"
          git diff --check HEAD^1..."$product_head" | tee pr11-main-validation-git-diff-check.txt
          ! grep -R "dangerouslySetInnerHTML" web/src
          ! grep -R "javascript:" web/src
          ! grep -R -E "OPENAI_API_KEY|ANTHROPIC_API_KEY|sk-[A-Za-z0-9]" web/src
          grep -R "include_all_candidates: false" web/src >/dev/null
          grep -R "candidate_graph" web/src/lib web/src/hooks web/src/components web/src/pages >/dev/null
          grep -R "focusedRouteComplete" web/src >/dev/null
          grep -R "fallbackUsed" web/src >/dev/null
          printf '%s\n' \
            'No unsafe HTML or javascript URL literals found.' \
            'No frontend API-key patterns found.' \
            'Selected request explicitly uses include_all_candidates=false.' \
            'Candidate graph is consumed through typed contracts.' \
            'Focused-route completeness and fallback semantics are explicit.' \
            > pr11-main-validation-security.txt

      - name: Run real multi-CVE demonstration
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin audit/iteration2-preflight-20260618
          git show origin/audit/iteration2-preflight-20260618:audit/iteration2_demo.py > /tmp/iteration2_demo.py
          python /tmp/iteration2_demo.py | tee pr11-main-validation-real-demo.txt

      - name: Smoke API and verify visual evidence
        shell: bash
        run: |
          set -euo pipefail
          CVEzD3FEND api > pr11-main-validation-api.log 2>&1 & api_pid=$!
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health > pr11-main-validation-health.json; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/health > pr11-main-validation-health.json
          count="$(find web/docs/screenshots -maxdepth 1 -name 'multi-cve-*.png' | wc -l)"
          test "$count" -ge 7
          find web/docs/screenshots -maxdepth 1 -name 'multi-cve-*.png' -printf '%f %s bytes\n' | sort > pr11-main-validation-screenshots.txt
          awk '$2 < 5000 { exit 1 }' pr11-main-validation-screenshots.txt

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: pr11-main-release-validation
          path: |
            pr11-main-validation-*.txt
            pr11-main-validation-health.json
            pr11-main-validation-api.log
            iteration2-real-selected.json
            iteration2-real-all.json
            iteration2-real-summary.json
            web/docs/screenshots/multi-cve-*.png
          if-no-files-found: error
          retention-days: 7
