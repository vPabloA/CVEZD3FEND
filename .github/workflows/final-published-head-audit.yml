name: Final published product head audit

on:
  pull_request:
    branches:
      - feat/multi-cve-contextual-analysis

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/multi-cve-contextual-analysis
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install backend and visual tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,api]'
          python -m pip install selenium
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend
        working-directory: web
        run: npm ci
      - name: Run published-head audit
        shell: bash
        run: |
          git fetch origin audit/iteration2-preflight-20260618
          git show origin/audit/iteration2-preflight-20260618:audit/final-closure/published_audit.sh > /tmp/published_audit.sh
          bash /tmp/published_audit.sh
      - uses: actions/upload-artifact@v4
        with:
          name: final-published-head-audit
          path: |
            /tmp/published-evidence/*
            web/docs/screenshots/multi-cve-03-all-candidates.png
            web/docs/screenshots/multi-cve-04-partial-success.png
            web/docs/screenshots/multi-cve-07-focused-route-truth.png
          if-no-files-found: error
          retention-days: 7
