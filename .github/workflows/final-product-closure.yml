name: Final product closure validation

on:
  push:
    branches:
      - audit/iteration2-preflight-20260618

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PRODUCT_BRANCH: feat/multi-cve-contextual-analysis
      EXPECTED_HEAD: 3857b2adb0d5cb18b7d1260397c31fbd87259d36
      VALIDATED_BRANCH: audit/final-closure-validated-v1
      EVIDENCE_BRANCH: audit/final-closure-evidence-v1
      FAILED_BRANCH: audit/final-closure-failed-v1
    steps:
      - name: Checkout audit harness
        uses: actions/checkout@v4
        with:
          ref: audit/iteration2-preflight-20260618
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare exact product checkout
        shell: bash
        run: |
          set -euo pipefail
          cp audit/final-closure/source_01.py /tmp/source_01.py
          cp audit/final-closure/source_02.py /tmp/source_02.py
          cp audit/final-closure/source_03.py /tmp/source_03.py
          cp audit/final-closure/tests_01a.py /tmp/tests_01a.py
          cp audit/final-closure/tests_01b.py /tmp/tests_01b.py
          cp audit/final-closure/tests_02a.py /tmp/tests_02a.py
          cp audit/final-closure/tests_02b.py /tmp/tests_02b.py
          cp audit/final-closure/tests_02c_review.py /tmp/tests_02c_review.py
          cp audit/final-closure/tests_02c_ai.py /tmp/tests_02c_ai.py
          cp audit/final-closure/capture.py /tmp/capture.py
          cp audit/iteration2_demo.py /tmp/iteration2_demo.py
          git fetch origin "$PRODUCT_BRANCH"
          test "$(git rev-parse origin/$PRODUCT_BRANCH)" = "$EXPECTED_HEAD"
          git checkout -B final-product-correction "$EXPECTED_HEAD"
          test -z "$(git status --short)"
          git rev-parse HEAD > /tmp/previous-head.txt

      - name: Apply corrective transforms
        shell: bash
        run: |
          set -euo pipefail
          python /tmp/source_01.py
          python /tmp/source_02.py
          python /tmp/source_03.py
          python /tmp/tests_01a.py
          python /tmp/tests_01b.py
          python /tmp/tests_02a.py
          python /tmp/tests_02b.py
          python /tmp/tests_02c_review.py
          python /tmp/tests_02c_ai.py
          git diff --check
          git diff --stat | tee final-correction-diff-stat.txt
          git diff --name-only | sort | tee final-correction-files.txt

      - name: Restore generated bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/dist
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/knowledge-bundle.json > data/dist/knowledge-bundle.json
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/promoted-edges.json > data/dist/promoted-edges.json
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/quality-report.json > data/dist/quality-report.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install backend and visual tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,api]'
          python -m pip install selenium

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend
        working-directory: web
        run: npm ci

      - name: Compile Python
        shell: bash
        run: |
          set -o pipefail
          python3 -m compileall src tests 2>&1 | tee final-compileall.txt

      - name: Run backend tests
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee final-pytest.txt

      - name: Run frontend lint
        shell: bash
        working-directory: web
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee ../final-frontend-lint.txt

      - name: Run frontend tests
        shell: bash
        working-directory: web
        run: |
          set -o pipefail
          npm run test 2>&1 | tee ../final-frontend-test.txt

      - name: Run production build
        shell: bash
        working-directory: web
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../final-frontend-build.txt

      - name: Verify frontend trust boundary
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R "dangerouslySetInnerHTML" web/src
          ! grep -R "javascript:" web/src
          ! grep -R -E "(OPENAI_API_KEY|ANTHROPIC_API_KEY|sk-[A-Za-z0-9])" web/src
          grep -n "focusedEdgeIds" web/src/components/reasoning/graph/graphAdapter.ts > final-trust-checks.txt
          grep -n "focusedRouteComplete" web/src/components/reasoning/graph/ThreatDefenseGraphNavigator.tsx >> final-trust-checks.txt
          grep -n "fallbackUsed" web/src/pages/AnalyzePage.tsx >> final-trust-checks.txt
          grep -n "reviewRequired: focusedRouteReviewRequired" web/src/pages/AnalyzePage.tsx >> final-trust-checks.txt
          printf '%s\n' "No unsafe HTML, javascript URL literals or frontend API secrets found." >> final-trust-checks.txt

      - name: Run real multi-CVE demonstration
        shell: bash
        run: |
          set -o pipefail
          python /tmp/iteration2_demo.py 2>&1 | tee final-real-demo.txt

      - name: Start product and capture visual evidence
        shell: bash
        run: |
          set -euo pipefail
          CVEzD3FEND api > final-api.log 2>&1 & api_pid=$!
          (cd web && npm run dev -- --host 127.0.0.1 --port 5173 > ../final-vite.log 2>&1) & vite_pid=$!
          trap 'kill "$api_pid" "$vite_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8000/api/health >/dev/null && curl -fsS http://127.0.0.1:5173/ >/dev/null && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/health | tee final-health.json
          python /tmp/capture.py
          find web/docs/screenshots -maxdepth 1 -name 'multi-cve-0[347]-*.png' -printf '%f %s bytes\n' | sort | tee final-screenshots.txt
          awk '$2 < 5000 { exit 1 }' final-screenshots.txt
          kill "$api_pid" "$vite_pid" 2>/dev/null || true
          trap - EXIT

      - name: Review exact diff and create atomic commit
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- web/tsconfig.tsbuildinfo web/tsconfig.node.tsbuildinfo 2>/dev/null || true
          git diff --check
          expected=$(cat <<'EOF'
          web/docs/screenshots/multi-cve-03-all-candidates.png
          web/docs/screenshots/multi-cve-04-partial-success.png
          web/docs/screenshots/multi-cve-07-focused-route-truth.png
          web/src/components/reasoning/batch/BatchDecisionSummary.tsx
          web/src/components/reasoning/graph/ThreatDefenseGraphNavigator.tsx
          web/src/components/reasoning/graph/graphAdapter.ts
          web/src/components/reasoning/graph/graphTypes.ts
          web/src/pages/AnalyzePage.tsx
          web/src/test/AnalyzePage.test.tsx
          web/src/test/batchGraphAdapter.test.ts
          EOF
          )
          actual=$(git status --short | sed -E 's/^.. //' | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sed 's/^          //' | sed '/^$/d' | sort)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src web/docs/screenshots/multi-cve-03-all-candidates.png web/docs/screenshots/multi-cve-04-partial-success.png web/docs/screenshots/multi-cve-07-focused-route-truth.png
          git diff --cached --check
          git commit -m "fix(product): preserve focused-route truth and accessible status semantics"
          test "$(git rev-list --count "$EXPECTED_HEAD"..HEAD)" = "1"
          git rev-parse HEAD | tee final-corrective-head.txt
          git show --stat --oneline HEAD | tee final-commit-stat.txt
          git push origin "HEAD:$VALIDATED_BRANCH"

      - name: Publish evidence branch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit-results/final-closure
          cp final-*.txt final-*.json final-api.log final-vite.log iteration2-real-*.json audit-results/final-closure/ 2>/dev/null || true
          cp web/docs/screenshots/multi-cve-03-all-candidates.png audit-results/final-closure/
          cp web/docs/screenshots/multi-cve-04-partial-success.png audit-results/final-closure/
          cp web/docs/screenshots/multi-cve-07-focused-route-truth.png audit-results/final-closure/
          git add -f audit-results/final-closure
          git commit -m "chore(audit): publish final closure evidence"
          git push origin "HEAD:$EVIDENCE_BRANCH"
