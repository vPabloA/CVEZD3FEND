name: FastTrack baseline validation

on:
  pull_request:
    branches:
      - audit/fasttrack-baseline-base

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout validation merge
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -e '.[dev,api]'

      - name: Restore pre-checkpoint generated baseline artifacts
        run: |
          mkdir -p data/dist baseline-results
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/knowledge-bundle.json > data/dist/knowledge-bundle.json
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/promoted-edges.json > data/dist/promoted-edges.json
          git show acef9dd4932bd98e0cf49a3ee1f460c072aa553e:data/dist/quality-report.json > data/dist/quality-report.json
          git rev-parse HEAD | tee baseline-results/checked-out-head.txt
          git rev-parse origin/ux/trace-graph-navigator-polish | tee baseline-results/product-head.txt

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Python compile baseline
        run: set -o pipefail; python3 -m compileall src tests 2>&1 | tee baseline-results/compileall.txt

      - name: Python test baseline
        run: set -o pipefail; pytest -q 2>&1 | tee baseline-results/pytest.txt

      - name: Frontend lint baseline
        working-directory: web
        run: set -o pipefail; npm run lint 2>&1 | tee ../baseline-results/frontend-lint.txt

      - name: Frontend test baseline
        working-directory: web
        run: set -o pipefail; npm run test 2>&1 | tee ../baseline-results/frontend-test.txt

      - name: Frontend build baseline
        working-directory: web
        run: set -o pipefail; npm run build 2>&1 | tee ../baseline-results/frontend-build.txt

      - name: Diff whitespace baseline
        run: set -o pipefail; git diff --check 2>&1 | tee baseline-results/git-diff-check.txt

      - name: Package validated workspace
        run: |
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=node_modules \
            --exclude=web/node_modules \
            --exclude=web/dist \
            --exclude=baseline-results \
            --exclude='**/__pycache__' \
            -czf baseline-results/fasttrack-workspace.tar.gz .
          sha256sum baseline-results/fasttrack-workspace.tar.gz | tee baseline-results/fasttrack-workspace.sha256

      - name: Upload exact baseline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fasttrack-baseline-results
          path: baseline-results/
          if-no-files-found: error
          retention-days: 7
